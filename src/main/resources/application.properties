spring.application.name=Liora

server.port=8080

spring.thymeleaf.cache=false

spring.web.locale=vi_VN

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/LioraDB2?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

storage.location=./uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${storage.location}/temp

spring.web.resources.static-locations=classpath:/static/,file:${storage.location}/
spring.mvc.static-path-pattern=/uploads/**

spring.web.resources.add-mappings=true
spring.web.resources.cache.cachecontrol.max-age=3600

image.optimization.max-width=1200
image.optimization.max-height=1200
image.optimization.thumbnail-size=300
image.optimization.quality=0.8
image.optimization.max-file-size=10485760

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=utf-8

jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=3600
jwt.refreshable-duration=36000


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# dùng callback mặc định của Spring
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/google

# ===== VNPAY CONFIG =====
# Lưu ý: điền giá trị thực từ VNPAY Merchant Portal
vnpay.tmnCode=${VNPAY_TMN_CODE:}
vnpay.hashSecret=${VNPAY_HASH_SECRET:}
vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=${APP_URL:http://localhost:8080}/payment/vnpay/return
vnpay.ipnUrl=${APP_URL:http://localhost:8080}/payment/vnpay/ipn
vnpay.trustReturnWhenIpnMissing=true
vnpay.version=2.1.0
vnpay.command=pay
vnpay.currCode=VND
vnpay.locale=vn

# ===== MOMO CONFIG =====
# Lưu ý: điền giá trị thực từ MOMO Developer Portal
momo.partnerCode=${MOMO_PARTNER_CODE:MOMO}
momo.accessKey=${MOMO_ACCESS_KEY:}
momo.secretKey=${MOMO_SECRET_KEY:}
momo.api.endpoint=https://test-payment.momo.vn/gw_payment/transactionProcessor
momo.api.endpoint.query=https://test-payment.momo.vn/v2/gateway/api/query
momo.returnUrl=${APP_URL:http://localhost:8080}/payment/momo/return
momo.notifyUrl=${APP_URL:http://localhost:8080}/payment/momo/ipn
momo.requestType=captureMoMoWallet
momo.orderType=other
momo.timeout=30000

# ===== GHN API CONFIG =====

ghn.api.base-url=https://dev-online-gateway.ghn.vn/shiip/public-api
ghn.api.token=${GHN_API_TOKEN:}
ghn.api.shop-id=${GHN_API_SHOP_ID:}
ghn.api.service-id=${GHN_API_SERVICE_ID:}
ghn.api.from-district-id=${GHN_API_FROM_DISTRICT_ID:}
ghn.api.from-ward-code=${GHN_API_FROM_WARD_CODE:}
ghn.api.from-name=Liora
ghn.api.from-phone=${GHN_API_FROM_PHONE:}
ghn.api.from-address=${GHN_API_FROM_ADDRESS:}

# ===== EMAIL CONFIG =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com