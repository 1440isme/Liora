spring.application.name=Liora

# Azure Container Apps sẽ inject PORT; ưu tiên env nếu có
server.port=${PORT:${SERVER_PORT:8080}}

spring.web.locale=vi_VN

# ===== Thymeleaf (prod nên bật cache) =====
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=utf-8

# ===== Datasource (TiDB/MySQL compatible) =====
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ===== JPA =====
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ===== Uploads =====
# Lưu ý: filesystem container không bền vững nếu không mount volume (Azure Files).
storage.location=${STORAGE_LOCATION:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${storage.location}/temp
spring.web.resources.static-locations=classpath:/static/,file:${storage.location}/
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.add-mappings=true
spring.web.resources.cache.cachecontrol.max-age=3600

# ===== Image optimization =====
image.optimization.max-width=1200
image.optimization.max-height=1200
image.optimization.thumbnail-size=300
image.optimization.quality=0.8
image.optimization.max-file-size=10485760

# ===== App URL (cho OAuth2 + payment callback) =====
app.url=${APP_URL}

# ===== JWT =====
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=${JWT_VALID_DURATION:3600}
jwt.refreshable-duration=${JWT_REFRESHABLE_DURATION:36000}

# ===== OAuth2 Google =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL}/login/oauth2/code/google

# ===== VNPAY =====
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.returnUrl=${APP_URL}/payment/vnpay/return
vnpay.ipnUrl=${APP_URL}/payment/vnpay/ipn
vnpay.trustReturnWhenIpnMissing=${VNPAY_TRUST_RETURN_WHEN_IPN_MISSING:true}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.currCode=${VNPAY_CURR_CODE:VND}
vnpay.locale=${VNPAY_LOCALE:vn}

# ===== MOMO =====
momo.partnerCode=${MOMO_PARTNER_CODE}
momo.accessKey=${MOMO_ACCESS_KEY}
momo.secretKey=${MOMO_SECRET_KEY}
momo.api.endpoint=${MOMO_API_ENDPOINT:https://test-payment.momo.vn/gw_payment/transactionProcessor}
momo.api.endpoint.query=${MOMO_API_ENDPOINT_QUERY:https://test-payment.momo.vn/v2/gateway/api/query}
momo.returnUrl=${APP_URL}/payment/momo/return
momo.notifyUrl=${APP_URL}/payment/momo/ipn
momo.requestType=${MOMO_REQUEST_TYPE:captureMoMoWallet}
momo.orderType=${MOMO_ORDER_TYPE:other}
momo.timeout=${MOMO_TIMEOUT:30000}

# ===== GHN =====
ghn.api.base-url=${GHN_API_BASE_URL:https://dev-online-gateway.ghn.vn/shiip/public-api}
ghn.api.token=${GHN_API_TOKEN}
ghn.api.shop-id=${GHN_API_SHOP_ID}
ghn.api.service-id=${GHN_API_SERVICE_ID}
ghn.api.from-district-id=${GHN_API_FROM_DISTRICT_ID}
ghn.api.from-ward-code=${GHN_API_FROM_WARD_CODE}
ghn.api.from-name=${GHN_API_FROM_NAME:Liora}
ghn.api.from-phone=${GHN_API_FROM_PHONE}
ghn.api.from-address=${GHN_API_FROM_ADDRESS}

# ===== Email =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

